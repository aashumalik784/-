<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AASHU OTT - Streaming Now</title>
    <style>
        body { background-color: #141414; color: white; font-family: 'Arial', sans-serif; margin: 0; overflow-x: hidden; }
        .navbar { padding: 15px 4%; background: rgba(0,0,0,0.8); position: fixed; width: 100%; z-index: 100; display: flex; align-items: center; }
        .logo { color: #e50914; font-size: 28px; font-weight: bold; text-decoration: none; letter-spacing: 1px; }
        
        .hero { height: 80vh; background: linear-gradient(to top, #141414, transparent), url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=1470&auto=format&fit=crop'); background-size: cover; background-position: center; display: flex; align-items: center; padding: 0 5%; }
        .hero-content { max-width: 600px; }
        .hero-content h1 { font-size: 3.5rem; margin-bottom: 0.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .play-btn { background: white; color: black; border: none; padding: 12px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 5px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .play-btn:hover { background: rgba(255,255,255,0.8); }

        /* Video Popup Styling */
        #videoPlayer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .close-player { position: absolute; top: 20px; right: 30px; font-size: 40px; color: white; cursor: pointer; }
        iframe { width: 80%; height: 70%; border: none; border-radius: 10px; box-shadow: 0px 0px 30px rgba(229, 9, 20, 0.5); }

        .movie-section { padding: 3rem 5%; }
        .movie-grid { display: flex; gap: 15px; overflow-x: auto; padding: 20px 0; }
        .movie-card { min-width: 200px; transition: 0.4s; cursor: pointer; border-radius: 8px; overflow: hidden; }
        .movie-card:hover { transform: scale(1.1); z-index: 5; }
        .movie-card img { width: 100%; height: 280px; object-fit: cover; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="#" class="logo">AASHU OTT</a>
    </div>

    <div class="hero">
        <div class="hero-content">
            <h1>Action Blockbuster</h1>
            <p>Experience the high-level world of Aashu Malik Creations. Watch the latest content now.</p>
            <button class="play-btn" onclick="openPlayer('dQw4w9WgXcQ')">▶ Play Now</button>
        </div>
    </div>

    <div id="videoPlayer">
        <span class="close-player" onclick="closePlayer()">&times;</span>
        <div id="playerFrame"></div>
    </div>

    <div class="movie-section">
        <h3>Aashu Malik Creations - Trending</h3>
        <div class="movie-grid">
            <div class="movie-card" onclick="openPlayer('L_LUpnjLpGs')">
                <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=400" alt="Movie">
            </div>
            <div class="movie-card" onclick="openPlayer('9bZkp7q19f0')">
                <img src="https://images.unsplash.com/photo-1594908900066-3f47337549d8?w=400" alt="Movie">
            </div>
            <div class="movie-card" onclick="openPlayer('tgbNymZ7vqY')">
                <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=400" alt="Movie">
            </div>
        </div>
    </div>

    <script>
        function openPlayer(videoId) {
            document.getElementById('videoPlayer').style.display = 'flex';
            document.getElementById('playerFrame').innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        }
        function closePlayer() {
            document.getElementById('videoPlayer').style.display = 'none';
            document.getElementById('playerFrame').innerHTML = '';
        }
    </script>
</body>
</html>
